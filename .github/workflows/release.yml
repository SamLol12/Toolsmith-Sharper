name: Auto Release on Push

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Version and Metadata Extraction
      - name: Extract Metadata
        id: metadata
        run: |
          # Read versions directly from gradle.properties
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)
          MC_VERSION=$(grep 'minecraft_version' gradle.properties | cut -d'=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV
          echo "Detected Mod Version: $VERSION"
          echo "Detected Minecraft Version: $MC_VERSION"

      # 2. Build Process
      - name: Build with Gradle
        run: ./gradlew build

      # 3. Changelog Generation
      - name: Generate Changelog
        id: changelog
        run: |
          echo "## ✨ What's New in Version ${{ env.VERSION }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          echo "### 🚀 Features" >> CHANGELOG.md
          # Look for commits starting with "feat"
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"* %s" --grep="feat" >> CHANGELOG.md || echo "* New features and additions" >> CHANGELOG.md
          
          echo -e "\n\n### 🔧 Fixes & Improvements" >> CHANGELOG.md
          # Look for commits starting with "fix", "refactor", or "perf"
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"* %s" --grep="fix\|refactor\|perf" >> CHANGELOG.md || echo "* Minor bug fixes and performance tweaks" >> CHANGELOG.md
          
          echo -e "\n\n### 📦 Technical Details" >> CHANGELOG.md
          echo "* Compiled for Minecraft ${{ env.MC_VERSION }}" >> CHANGELOG.md
          echo "* Build ID: $GITHUB_RUN_NUMBER" >> CHANGELOG.md

      # 4. GitHub Release Creation
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: build/libs/*.jar
          make_latest: true
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}